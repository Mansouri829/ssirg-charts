      align-items: center;
    }

    .card {

    h1 {
      margin-bottom: 10px;
      font-size: 26px;
    }

    p {
      color: #555;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      background: #1f6feb;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      background: #0d4ed8;
    }

    .small {
      margin-top: 20px;
      font-size: 12px;
